<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Tool — Stuntman Myk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-warm: #131110;
    --text: #e8e0d6;
    --text-muted: #9a918a;
    --accent: #c4956a;
    --accent-soft: #b8845e;
    --accent-glow: rgba(196, 149, 106, 0.12);
    --rule: rgba(196, 149, 106, 0.25);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Raleway', 'Helvetica Neue', sans-serif;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg-warm);
    color: var(--text);
    line-height: 1.7;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }
  body::after {
    content: '';
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    padding: 40px 24px;
    text-align: center;
  }
  .nickname {
    font-family: var(--sans);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .video-title {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 5vw, 2.4rem);
    font-weight: 600;
    color: var(--text);
    margin-bottom: 28px;
    letter-spacing: 0.02em;
  }
  .video-wrap {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    margin-bottom: 32px;
  }
  .video-wrap iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  .back-link {
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--rule);
    transition: border-color 0.3s;
  }
  .back-link:hover {
    border-color: var(--accent);
  }
  @media (max-width: 600px) {
    .container { padding: 32px 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="nickname">Stuntman Myk</div>
  <h1 class="video-title">Power Tool</h1>
  <div class="video-wrap">
    <iframe src="https://www.youtube.com/embed/RioGXGoOIlk" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
  </div>
  <a href="/" class="back-link">&larr; Back to StuntmanMyk.com</a>
</div>
</body>
</html>
